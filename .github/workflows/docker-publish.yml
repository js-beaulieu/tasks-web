name: Docker Publish

on:
  push:
    branches: [main]

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/tasks/Dockerfile
          push: true
          build-args: DOMAIN=${{ secrets.DOMAIN }}
          tags: ghcr.io/js-beaulieu/hs-app-tasks:latest

      - name: Trigger Watchtower update
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.WATCHTOWER_API_TOKEN }}" \
            https://watchtower.${{ secrets.DOMAIN }}/v1/update
