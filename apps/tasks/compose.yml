services:
  postgres:
    image: postgres:16-alpine
    container_name: hs-web-tasks-postgres
    environment:
      POSTGRES_DB: tasks_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - tasks_api_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tasks_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hs-api-tasks

  hs-api-tasks:
    build:
      context: ../hs-api/api/tasks
      dockerfile: Dockerfile
    image: ghcr.io/js-beaulieu/hs-api-tasks:latest
    container_name: hs-web-tasks-hs-api-tasks
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      PG_CONNECTION_STRING: "postgres://postgres:postgres@postgres:5432/tasks_api?sslmode=disable"
      LOG_FORMAT: "text"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - hs-api-tasks

volumes:
  tasks_api_postgres_data:

networks:
  hs-api-tasks:
